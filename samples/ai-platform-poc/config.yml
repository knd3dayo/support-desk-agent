support_ope_agents:
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/OPENAI_API_KEY
    base_url: http://localhost:4000

  tools:
    logical_tools:
      run_python_analysis:
        enabled: true
        provider: builtin
      external_ticket:
        enabled: true
        provider: mcp
        description: ai-platform-poc チームの顧客向け検証問い合わせ
        server: support-ticket-mcp
        tool: get_external_ticket
      internal_ticket:
        enabled: true
        provider: mcp
        description: ai-platform-poc チームの内部管理チケット
        server: support-ticket-mcp
        tool: get_internal_ticket
    # 実 MCP を使う場合は、環境に合わせて manifest を有効化する
    # mcp_manifest_path: /home/user/source/repos/ai-chat-util/app/ai-chat-util-mcp.json

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: ai-platform-poc 向けサンプル
    ui_target_description: ai-platform-poc チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    SuperVisorAgent:
      enabled: true
      auto_compress: true
    IntakeAgent:
      enabled: true
      auto_compress: true
      pii_mask:
        enabled: false
    LogAnalyzerAgent:
      enabled: true
      auto_compress: true
    KnowledgeRetrieverAgent:
      enabled: true
      auto_compress: true
      document_sources:
        - name: ai-platform-poc
          description: ai-platform-poc の技術検証資料と設計資料
          path: /home/user/source/repos/ai-platform-poc
        - name: ai-chat-util
          description: ai-chat-util のソースコードと関連実装
          path: /home/user/source/repos/ai-chat-util
        - name: langchain-docs
          description: LangChain のローカルドキュメント
          path: /home/user/oss/langchain-ai/langchain
    DraftWriterAgent:
      enabled: true
      auto_compress: true
    ComplianceReviewerAgent:
      enabled: true
      auto_compress: true
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true