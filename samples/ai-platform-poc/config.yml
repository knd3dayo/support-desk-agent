support_ope_agents:
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/LLM_API_KEY
    base_url: http://localhost:4000

  tools:
    logical_tools:
      run_python_analysis:
        enabled: true
        provider: builtin
      external_ticket:
        enabled: false
        provider: mcp
        description: ai-platform-poc チームの顧客向け検証問い合わせ
        server: support-ticket-mcp
        tool: get_external_ticket
      internal_ticket:
        enabled: false
        provider: mcp
        description: ai-platform-poc チームの内部管理チケット
        server: support-ticket-mcp
        tool: get_internal_ticket
    # 実 MCP を使う場合は、環境に合わせて manifest を有効化する
    # mcp_manifest_path: /home/user/source/repos/ai-chat-util/app/ai-chat-util-mcp.json

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: ai-platform-poc 向けサンプル
    ui_target_description: ai-platform-poc チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    # sample は通常運用寄りの挙動を既定にする。
    # extraction_mode は取得粒度だけを変える設定で、constraint_mode とは別物。
    # 挙動比較したい場合だけ agent ごとに instruction_only / bypass へ切り替える。
    SuperVisorAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
      max_investigation_loops: 1
      auto_generate_report: true
      report_on:
        - waiting_approval
    IntakeAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
      pii_mask:
        enabled: false
    LogAnalyzerAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
    KnowledgeRetrieverAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
      extraction_mode: raw_backend
      document_sources:
        - name: ai-platform-poc
          description: ai-platform-poc の技術検証資料と設計資料
          path: /home/user/source/repos/ai-platform-poc
        - name: ai-chat-util
          description: ai-chat-util のソースコードと関連実装
          path: /home/user/source/repos/ai-chat-util
        - name: langchain-docs
          description: LangChain関連のローカルドキュメント
          path: /home/user/oss/langchain-ai
    DraftWriterAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
    ComplianceReviewerAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true
      constraint_mode: default