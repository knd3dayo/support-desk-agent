support_ope_agents:
  # このファイルは sample 実装をこの repository 単体で試すための実行用 config です。
  # 利用時は config.yml としてコピーして使う想定です。
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/LLM_API_KEY
    base_url: http://localhost:4000

  config_paths: {}

  data_paths: {}

  runtime:
    mode: sample

  tools:
    mcp_manifest_path: mcp.json
    logical_tools:
      # logical_tools は任意差し替えを許す tool だけを置きます。
      # external/internal ticket も現在はこちらで設定します。
      # write_shared_memory / read_shared_memory / write_working_memory / write_draft /
      # detect_log_format などの内部用 tool はここから MCP へ差し替えできません。
      external_ticket:
        enabled: true
        provider: mcp
        server: github
        description: GitHub 上で管理する顧客向け問い合わせ issue
        arguments:
          owner: your-github-org
          repo: support-ope-external-tickets
        candidate_matching:
          candidate_id_fields:
            - number
            - issue_number
            - id
            - key
          candidate_text_fields:
            - title
            - body
            - summary
            - description
          min_id_similarity: 0.45
          min_content_similarity: 0.2
          min_combined_similarity: 0.35
          max_question_candidates: 3
      internal_ticket:
        enabled: true
        provider: mcp
        server: github
        description: GitHub 上で管理する内部管理 issue
        arguments:
          owner: knd3dayo
          repo: support-ope-agents
        candidate_matching:
          candidate_id_fields:
            - number
            - issue_number
            - id
            - key
          candidate_text_fields:
            - title
            - body
            - summary
            - description
          min_id_similarity: 0.45
          min_content_similarity: 0.2
          min_combined_similarity: 0.35
          max_question_candidates: 3
      search_documents:
        enabled: true
        provider: builtin
      run_python_analysis:
        enabled: true
        provider: builtin

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: support-ope-agents 向けサンプル
    ui_target_description: support-ope-agents チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    default_constraint_mode: default
    SuperVisorAgent:
      enabled: true
      auto_compress: true
      max_investigation_loops: 1
      auto_generate_report: true
      report_on:
        - waiting_approval
    IntakeAgent:
      enabled: true
      auto_compress: true
      pii_mask:
        enabled: false
    InvestigateAgent:
      enabled: true
      auto_compress: true
      search_strategy: hybrid
      result_mode: relaxed
      document_sources:
        - name: support-ope-agents-docs
          description: support-ope-agents の設計資料と運用ドキュメント
          path: /home/user/source/repos/support-ope-agents/docs
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true