support_ope_agents:
  # このファイルは sample 実装をこの repository 単体で試すための実行用 config です。
  # 利用時は config.yml としてコピーして使う想定です。
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/LLM_API_KEY
    base_url: http://localhost:4000

  runtime:
    mode: sample

  tools:
    logical_tools:
      search_documents:
        enabled: true
        provider: builtin
      run_python_analysis:
        enabled: true
        provider: builtin
      external_ticket:
        enabled: false
        provider: mcp
        description: support-ope-agents チームの顧客向け検証問い合わせ
        server: support-ticket-mcp
        tool: get_external_ticket
      internal_ticket:
        enabled: false
        provider: mcp
        description: support-ope-agents チームの内部管理チケット
        server: support-ticket-mcp
        tool: get_internal_ticket
    # 実 MCP を使う場合は、環境に合わせて manifest を有効化する
    # mcp_manifest_path: /home/user/source/repos/ai-chat-util/app/ai-chat-util-mcp.json

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: support-ope-agents 向けサンプル
    ui_target_description: support-ope-agents チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    default_constraint_mode: default
    # sample は通常運用寄りの挙動を既定にする。
    # extraction_mode は取得粒度だけを変える設定で、constraint_mode とは別物。
    # 挙動比較したい場合だけ agent ごとに instruction_only / bypass へ切り替える。
    
    SuperVisorAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      max_investigation_loops: 1
      auto_generate_report: true
      report_on:
        - waiting_approval
    
    IntakeAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      pii_mask:
        enabled: false
    
    InvestigateAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      search_strategy: hybrid
      result_mode: relaxed
      document_sources:
        - name: support-ope-agents-docs
          description: support-ope-agents の設計資料と運用ドキュメント
          path: /home/user/source/repos/support-ope-agents/docs
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default