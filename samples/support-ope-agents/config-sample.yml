support_ope_agents:
  # このファイルは sample 実装をこの repository 単体で試すための実行用 config です。
  # 利用時は config.yml としてコピーして使う想定です。
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/LLM_API_KEY
    base_url: http://localhost:4000

  runtime:
    mode: sample

  tools:
    logical_tools:
      search_documents:
        enabled: true
        provider: builtin
      run_python_analysis:
        enabled: true
        provider: builtin
    # GitHub MCP を使う場合は、manifest 内で github server と
    # GITHUB_PERSONAL_ACCESS_TOKEN を設定したうえで path を有効化する
    # mcp_manifest_path: /path/to/mcp-manifest.json

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: support-ope-agents 向けサンプル
    ui_target_description: support-ope-agents チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    default_constraint_mode: default
    # sample は通常運用寄りの挙動を既定にする。
    # extraction_mode は取得粒度だけを変える設定で、constraint_mode とは別物。
    # 挙動比較したい場合だけ agent ごとに instruction_only / bypass へ切り替える。
    
    SuperVisorAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      max_investigation_loops: 1
      auto_generate_report: true
      report_on:
        - waiting_approval
    
    IntakeAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      pii_mask:
        enabled: false
      ticket_servers:
        external:
          enabled: false
          server: github
          description: GitHub 上で管理する顧客向け問い合わせ issue
          # decision XML のルートタグ。通常は既定値のままでよい
          # decision_tag: decision
          arguments:
            owner: your-github-org
            repo: support-ope-external-tickets
          candidate_matching:
            # Zendesk や Redmine では ["id", "ticket_id"] や ["id", "key"] のように変更する
            candidate_id_fields:
              - number
              - issue_number
              - id
              - key
            # 候補の本文比較に使うフィールド。ticket system ごとに上書きする
            candidate_text_fields:
              - title
              - body
              - summary
              - description
            # 類似候補を質問するしきい値。厳しくしたい場合だけ調整する
            min_id_similarity: 0.45
            min_content_similarity: 0.2
            min_combined_similarity: 0.35
            max_question_candidates: 3
        internal:
          enabled: true
          server: github
          description: GitHub 上で管理する内部管理 issue
          # decision XML のルートタグ。通常は既定値のままでよい
          # decision_tag: decision
          arguments:
            owner: knd3dayo
            repo: support-ope-agents
          candidate_matching:
            candidate_id_fields:
              - number
              - issue_number
              - id
              - key
            candidate_text_fields:
              - title
              - body
              - summary
              - description
            min_id_similarity: 0.45
            min_content_similarity: 0.2
            min_combined_similarity: 0.35
            max_question_candidates: 3
    
    InvestigateAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      search_strategy: hybrid
      result_mode: relaxed
      document_sources:
        - name: support-ope-agents-docs
          description: support-ope-agents の設計資料と運用ドキュメント
          path: /home/user/source/repos/support-ope-agents/docs
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default