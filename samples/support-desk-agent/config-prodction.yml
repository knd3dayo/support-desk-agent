support_desk_agent:
  # このファイルは production 実装をこの repository で試すための実行用 config です。
  # 利用時は config.yml としてコピーして使う想定です。
  llm:
    provider: openai
    model: poc-chat-model
    api_key: os.environ/LLM_API_KEY
    base_url: http://localhost:4000

  config_paths: {}

  data_paths: {}

  runtime:
    mode: production

  tools:
    ticket_sources:
      external:
        enabled: true
        server: github
        description: GitHub 上で管理する顧客向け問い合わせ issue
        arguments:
          owner: your-github-org
          repo: support-ope-external-tickets
      internal:
        enabled: true
        server: github
        description: GitHub 上で管理する内部管理 issue
        arguments:
          owner: your-github-org
          repo: support-ope-internal-tickets
    logical_tools:
      # logical_tools は optional override 対象だけを定義します。
      # external/internal ticket は ticket_sources で設定します。
      # workflow 内部メモリ用 tool や detect_log_format は MCP へ差し替えできません。
      search_documents:
        enabled: true
        provider: builtin
      run_python_analysis:
        enabled: true
        provider: builtin
    # GitHub MCP を使う場合は、manifest 内で github server と
    # GITHUB_PERSONAL_ACCESS_TOKEN を設定したうえで path を有効化する
    mcp_manifest_path: mcp.json

  interfaces:
    enable_cli: true
    enable_api: false
    enable_mcp: false
    ui_app_name: Support Desk
    ui_target_label: support-desk-agent 向けサンプル
    ui_target_description: support-desk-agent チームの問い合わせ検証とバックサポート連携を試すためのサンプル UI

  agents:
    default_constraint_mode: default
    # sample は通常運用寄りの挙動を既定にする。
    # extraction_mode は取得粒度だけを変える設定で、constraint_mode とは別物。
    # 挙動比較したい場合だけ agent ごとに instruction_only / bypass へ切り替える。
    
    SuperVisorAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      max_investigation_loops: 1
      auto_generate_report: true
      report_on:
        - waiting_approval
    
    IntakeAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      pii_mask:
        enabled: false
    
    InvestigateAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
      search_strategy: hybrid
      result_mode: relaxed
      document_sources:
        - name: support-desk-agent-docs
          description: support-desk-agent の設計資料と運用ドキュメント
          path: /home/user/source/repos/support-desk-agent/docs
    BackSupportEscalationAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default
    BackSupportInquiryWriterAgent:
      enabled: true
      auto_compress: true
      # constraint_mode: default