support_ope_agents:
  # LLM の接続設定です。
  # api_key は YAML に直書きせず、環境変数または .env から読み込む前提です。
  llm:
    # 使用する LLM プロバイダです。
    provider: openai

    # 使用するモデル名です。
    model: gpt-4.1

    # 環境変数参照です。実際の値は LLM_API_KEY から読み込みます。
    api_key: os.environ/LLM_API_KEY

  # 静的な設定ファイルや指示ファイルの場所です。
  # 既定値のままでよければ未指定で構いません。
  # config_paths:
  #   # 共通指示や各 Agent の指示ファイルを置くディレクトリです。
  #   # 必要に応じて、この配下の各 Agent 用 Markdown を直接編集します。
  #   instructions_path: ./.instructions

  # ケース管理データや実行時生成物の保存先です。
  # 既定値のままでよければ未指定で構いません。
  # data_paths:
  #   # ケース用 workspace 配下に作る共有メモリディレクトリ名です。
  #   shared_memory_subdir: .memory
  #
  #   # ケース用 workspace 配下に作る成果物ディレクトリ名です。
  #   artifacts_subdir: .artifacts
  #
  #   # ケース用 workspace 配下に作る証跡ディレクトリ名です。
  #   evidence_subdir: .evidence
  #
  #   # ケース用 workspace 配下に作るレポート出力ディレクトリ名です。
  #   report_subdir: .report
  #
  #   # ケース用 workspace 配下に作る LangGraph checkpoint 保存ディレクトリ名です。
  #   trace_subdir: .traces
  #
  #   # LangGraph checkpointer 用 SQLite ファイル名です。
  #   checkpoint_db_filename: checkpoints.sqlite

  # ワークフロー実行時のコンテキスト圧縮や承認ノードの設定です。
  # 通常は既定値のままで構いません。
  # workflow:
  #   # 圧縮前に扱うコンテキスト最大文字数です。
  #   max_context_chars: 12000
  #
  #   # この文字数を超えると圧縮を検討します。
  #   compress_threshold_chars: 9000
  #
  #   # 承認待ちに入るノード名です。
  #   approval_node: wait_for_approval
  #
  #   # true の場合は必要時に自動圧縮します。
  #   auto_compress: true
  #
  #   # 圧縮サマリの最大文字数です。
  #   max_summary_chars: 4000
  #
  # トレース基盤の設定です。
  # トレースを使わない場合は未指定で構いません。
  # tracing:
  #   # true にするとトレースを有効化します。
  #   enabled: false
  #
  #   # トレース送信先プロバイダです。
  #   provider: langfuse
  #
  #   # トレースのプロジェクト名です。
  #   project_name: support-ope-agents

  # runtime 実装の切り替え設定です。
  # 通常運用は production、サンプル構成を使う場合は sample を指定します。
  # runtime:
  #   mode: production

  # 外部インターフェースの有効化設定です。
  # CLI 以外を使わない場合は未指定で構いません。
  # interfaces:
  #   # CLI を有効化します。
  #   enable_cli: true
  #
  #   # API を有効化します。
  #   enable_api: false
  #
  #   # MCP サーバー公開を有効化します。
  #   enable_mcp: false
  #
  #   # API の待受ホストです。
  #   api_host: 127.0.0.1
  #
  #   # API の待受ポートです。
  #   api_port: 8000
  #
  #   # UI 上で表示するアプリ名です。
  #   ui_app_name: Support Desk
  #
  #   # UI が何向けかを示すラベルです。
  #   # 例: ai-platform-poc 向けサンプル
  #   ui_target_label:
  #
  #   # 補足説明を表示したい場合の任意テキストです。
  #   ui_target_description:
  #
  #   # frontend の npm run dev から直接叩く場合の許可 origin 一覧です。
  #   # 例: http://127.0.0.1:5173
  #   cors_allowed_origins: []
  #
  #   # true の場合、API 呼び出しに軽量トークン認証を要求します。
  #   auth_required: false
  #
  #   # 認証トークンです。YAML に直書きせず、環境変数参照を使います。
  #   # 例: os.environ/SUPPORT_OPE_API_TOKEN
  #   auth_token:
  #
  #   # 既定ではフロントから Authorization: Bearer <token> を送れば通ります。
  #   # 互換用に X-Support-Ope-Token ヘッダーも受け付けます。
  #   auth_header_name: X-Support-Ope-Token
  #
  #   # frontend/dist が存在する場合、FastAPI から SPA を同居配信します。
  #   # 開発中は frontend で npm run dev を起動し、既定の API ポートへ proxy します。
  #
  #   # MCP のトランスポート種別です。
  #   mcp_transport: streamable-http

  # ツールの供給方法と共通 runtime 設定です。
  # logical_tools では、各論理ツールを無効化するか、builtin を使うか、MCP を使うかを定義します。
  # tools:
  #   # 外部 MCP 定義ファイルへのパスです。
  #   # logical_tools のどれかで provider: mcp を使う場合は必須です。
  #   mcp_manifest_path:
  #
  #   # MCP 呼び出しの既定タイムアウト秒です。
  #   mcp_timeout_seconds: 30
  #
  #   # URL ダウンロード系ツールの既定タイムアウト秒です。
  #   download_timeout_seconds: 30
  #
  #   # 解析前に各ファイルから取り出す最大文字数です。
  #   analysis_max_chars: 16000
  #
  #   # Office 変換に使う LibreOffice 実行ファイルのパスです。
  #   # 実行名でも絶対パスでも指定できます。
  #   libreoffice_command:
  #
  #   # 論理ツールごとの有効化と供給元です。
  #   logical_tools:
  #     # まず InvestigateAgent で使う文書検索を有効化します。
  #     search_documents:
  #       enabled: true
  #       provider: builtin
  #
  #     # 次にケース情報の取得元を必要に応じて設定します。
  #     external_ticket:
  #       enabled: true
  #       provider: mcp
  #       description: 顧客向けケース管理システム
  #       server: support-ticket-mcp
  #       tool: get_external_ticket
  #     internal_ticket:
  #       enabled: true
  #       provider: mcp
  #       description: 内部管理用チケットシステム
  #       server: support-ticket-mcp
  #       tool: get_internal_ticket
  #
  #     # InvestigateAgent が内部で使うログ解析を builtin で有効化する場合です。
  #     run_python_analysis:
  #       enabled: true
  #       provider: builtin
  #
  #     # 承認後の更新処理を個別に切り替える場合です。
  #     prepare_ticket_update:
  #       enabled: true
  #       provider: builtin
  #     zendesk_reply:
  #       enabled: true
  #       provider: builtin
  #     redmine_update:
  #       enabled: false
  #
  #     # builtin があっても明示的に使わない例です。
  #     record_approval_decision:
  #       enabled: false

  # 上記 external_ticket / internal_ticket の MCP tool は ticket_id を受け取り、summary と attachments を含む JSON を返すことを推奨します。
  # attachments の各要素は以下のいずれかを持てます。
  #   - content_base64: バイナリ添付
  #   - content: テキスト添付
  #   - path: 既に取得済みファイルへのパス

  # Agent ごとの個別設定です。
  # 既定値のままでよければ未指定で構いません。
  # 各 Agent では共通で constraint_mode を指定できます。
  # default: 既定挙動です。instruction と runtime 制約の両方を使います。
  # instruction_only: instruction だけを使い、コード側の制約は極力外します。
  # runtime_only: instruction を外し、コード側の制約だけを使います。
  # bypass: instruction と runtime 制約の両方を極力外します。
  # ただし安全上必須の最小ガードや状態遷移の必須条件は bypass でも維持します。
  # agents:
  #   # 全 Agent に効く既定の constraint_mode です。
  #   # 個別 Agent 側で constraint_mode を省略した場合だけ継承されます。
  #   # 例: 全体を bypass にして、一部だけ default へ戻す、という使い方ができます。
  #   default_constraint_mode: default
  #
  #   # スーパーバイザー Agent の設定です。
  #   SuperVisorAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default
  #     # InvestigateAgent への追加調査ループ回数です。
  #     # 新しい事実が見つかったときだけ再指示します。0 で無効化します。
  #     max_investigation_loops: 1
  #     # true の場合、指定トリガで改善レポートを自動生成します。
  #     auto_generate_report: false
  #     # 自動生成する契機です。waiting_approval / closed を指定できます。
  #     # 1 件だけなら waiting_approval のような単一文字列でも指定できます。
  #     report_on:
  #       - waiting_approval
  #
  #   # 受付 Agent の設定です。
  #   IntakeAgent:
  #     enabled: true
  #     auto_compress: true
  #     # 未指定なら agents.default_constraint_mode を継承します。
  #     constraint_mode: default
  #     pii_mask:
  #       # true の場合のみ Intake で PII マスキングを実行します。
  #       enabled: false
  #
  #   # 調査統合 Agent の設定です。
  #   # 仕様確認、ログ解析、ドラフト作成を 1 つの Agent に集約します。
  #   InvestigateAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default
  #     # constraint_mode は制約の適用方針です。
  #     # search_strategy は検索の進め方です。deepagents / hybrid / backend_only を指定できます。
  #     # deepagents: DeepAgents の探索結果を主に使います。
  #     # hybrid: DeepAgents の結果を起点に backend 読み取りと grep 証跡で補強します。
  #     # backend_only: backend 読み取りと grep だけで deterministic に検索します。
  #     search_strategy: hybrid
  #
  #     # result_mode は検索結果として何を保持するかです。relaxed / raw_backend を指定できます。
  #     # relaxed: 要点、根拠断片、機能箇条書きを中心に保持します。
  #     # raw_backend: 上記に加えて backend から読んだ本文も保持します。
  #     result_mode: relaxed
  #
  #     # backend から本文を読むときの最大文字数です。
  #     # 通常は既定値のままで構いません。
  #     backend_read_char_limit: 8000
  #
  #     # 根拠断片として保持する grep 一致件数の上限です。
  #     max_evidence_count: 3
  #
  #     # source ごとに候補として保持する Markdown パス数の上限です。
  #     candidate_path_limit: 5
  #
  #     # true の場合、InvestigateAgent 配下に raw search snapshot を JSON で保存します。
  #     persist_raw_search_snapshot: false
  #
  #     # InvestigateAgent が参照する文書群です。
  #     document_sources:
  #       - name: python312_manual
  #         description: Python 3.12 の公式仕様・標準ライブラリ資料
  #         path: ./docsources/python312_manual
  #       - name: denodo93_manual
  #         description: Denodo 9.3 の製品マニュアル
  #         path: ./docsources/denodo93_manual
  #       - name: growi_knowledge
  #         description: 社内 GROWI にエクスポートした運用ナレッジ
  #         path: ./docsources/growi_knowledge
  #       - name: ai-platform-poc
  #         description: 生成AI基盤のアーキテクチャ検討資料
  #         path: /home/user/source/repos/ai-platform-poc
  #     # DeepAgents backend では各 source を /knowledge/<name>/ 配下へ mount または route して参照します。
  #     # shared memory への context / progress / summary 転記も、この Agent が毎回担当します。
  #     # 回答表現の制約や書き分けは runtime ではなく instruction 側で管理します。
  #         - 生成AIは誤った回答をすることがあります
  #         - 生成AIは誤った回答を含む可能性があります
  #
  #   # バックサポート向けエスカレーション整理 Agent の設定です。
  #   BackSupportEscalationAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default
  #     # エスカレーション判定と不足資料補完の設定です。
  #     escalation:
  #       # 未解決や確証不足とみなす語句です。
  #       uncertainty_markers:
  #         - 未解決
  #         - 不明
  #         - 特定でき
  #         - 確証
  #         - 追加ログ
  #         - need more logs
  #         - unable to conclude
  #         - insufficient evidence
  #
  #       # ログ不足とみなす語句です。
  #       missing_log_markers:
  #         - ログファイルが見つからなかった
  #
  #       # workflow_kind ごとの既定依頼資料です。
  #       default_missing_artifacts_by_workflow:
  #         incident_investigation:
  #           - 発生時刻前後のアプリケーションログ
  #           - 再現手順または実施操作
  #         specification_inquiry:
  #           - 関連仕様書または設定値
  #           - 期待動作と実際の動作差分
  #         ambiguous_case:
  #           - 発生条件を示す追加ログ
  #           - 期待動作と実際の動作差分
  #
  #   # バックサポート問い合わせ文案作成 Agent の設定です。
  #   BackSupportInquiryWriterAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default
  #
  #   # 承認フェーズ Agent の設定です。
  #   ApprovalAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default
  #
  #   # チケット更新 Agent の設定です。
  #   TicketUpdateAgent:
  #     enabled: true
  #     auto_compress: true
  #     constraint_mode: default