support_ope_agents:
  # LLM の接続設定です。
  # api_key は YAML に直書きせず、環境変数または .env から読み込む前提です。
  llm:
    # 使用する LLM プロバイダです。
    provider: openai

    # 使用するモデル名です。
    model: gpt-4.1

    # 環境変数参照です。実際の値は OPENAI_API_KEY から読み込みます。
    api_key: os.environ/OPENAI_API_KEY

  # 静的な設定ファイルや指示ファイルの場所です。
  # 既定値のままでよければ未指定で構いません。
  # config_paths:
  #   # 共通指示や各 Agent の指示ファイルを置くディレクトリです。
  #   # 必要に応じて、この配下の各 Agent 用 Markdown を直接編集します。
  #   instructions_path: ./.instructions

  # ケース管理データや実行時生成物の保存先です。
  # 既定値のままでよければ未指定で構いません。
  # data_paths:
  #   # ケース用 workspace 配下に作る共有メモリディレクトリ名です。
  #   shared_memory_subdir: .memory
  #
  #   # ケース用 workspace 配下に作る成果物ディレクトリ名です。
  #   artifacts_subdir: .artifacts
  #
  #   # ケース用 workspace 配下に作る証跡ディレクトリ名です。
  #   evidence_subdir: .evidence

  # ワークフロー実行時のコンテキスト圧縮や承認ノードの設定です。
  # 通常は既定値のままで構いません。
  # workflow:
  #   # 圧縮前に扱うコンテキスト最大文字数です。
  #   max_context_chars: 12000
  #
  #   # この文字数を超えると圧縮を検討します。
  #   compress_threshold_chars: 9000
  #
  #   # 承認待ちに入るノード名です。
  #   approval_node: wait_for_approval
  #
  #   # true の場合は必要時に自動圧縮します。
  #   auto_compress: true
  #
  #   # 圧縮サマリの最大文字数です。
  #   max_summary_chars: 4000
  #
  #   # エスカレーション判定と不足資料補完の設定です。
  #   escalation:
  #     # 未解決や確証不足とみなす語句です。
  #     uncertainty_markers:
  #       - 未解決
  #       - 不明
  #       - 特定でき
  #       - 確証
  #       - 追加ログ
  #       - need more logs
  #       - unable to conclude
  #       - insufficient evidence
  #
  #     # ログ不足とみなす語句です。
  #     missing_log_markers:
  #       - ログファイルが見つからなかった
  #
  #     # workflow_kind ごとの既定依頼資料です。
  #     default_missing_artifacts_by_workflow:
  #       incident_investigation:
  #         - 発生時刻前後のアプリケーションログ
  #         - 再現手順または実施操作
  #       specification_inquiry:
  #         - 関連仕様書または設定値
  #         - 期待動作と実際の動作差分
  #       ambiguous_case:
  #         - 発生条件を示す追加ログ
  #         - 期待動作と実際の動作差分

  # トレース基盤の設定です。
  # トレースを使わない場合は未指定で構いません。
  # tracing:
  #   # true にするとトレースを有効化します。
  #   enabled: false
  #
  #   # トレース送信先プロバイダです。
  #   provider: langsmith
  #
  #   # トレースのプロジェクト名です。
  #   project_name: support-ope-agents

  # 外部インターフェースの有効化設定です。
  # CLI 以外を使わない場合は未指定で構いません。
  # interfaces:
  #   # CLI を有効化します。
  #   enable_cli: true
  #
  #   # API を有効化します。
  #   enable_api: false
  #
  #   # MCP サーバー公開を有効化します。
  #   enable_mcp: false
  #
  #   # API の待受ホストです。
  #   api_host: 127.0.0.1
  #
  #   # API の待受ポートです。
  #   api_port: 8000
  #
  #   # MCP のトランスポート種別です。
  #   mcp_transport: streamable-http

  # ツールの供給方法と共通 runtime 設定です。
  # logical_tools では、各論理ツールを無効化するか、builtin を使うか、MCP を使うかを定義します。
  # tools:
  #   # 外部 MCP 定義ファイルへのパスです。
  #   # logical_tools のどれかで provider: mcp を使う場合は必須です。
  #   mcp_manifest_path:
  #
  #   # MCP 呼び出しの既定タイムアウト秒です。
  #   mcp_timeout_seconds: 30
  #
  #   # URL ダウンロード系ツールの既定タイムアウト秒です。
  #   download_timeout_seconds: 30
  #
  #   # 解析前に各ファイルから取り出す最大文字数です。
  #   analysis_max_chars: 16000
  #
  #   # Office 変換に使う LibreOffice 実行ファイルのパスです。
  #   # 実行名でも絶対パスでも指定できます。
  #   libreoffice_command:
  #
  #   # 論理ツールごとの有効化と供給元です。
  #   logical_tools:
  #     # まず KnowledgeRetrieverAgent で使う文書検索を有効化します。
  #     search_documents:
  #       enabled: true
  #       provider: builtin
  #
  #     # 次にケース情報の取得元を必要に応じて設定します。
  #     external_ticket:
  #       enabled: true
  #       provider: mcp
  #       description: 顧客向けケース管理システム
  #       server: support-ticket-mcp
  #       tool: get_external_ticket
  #     internal_ticket:
  #       enabled: true
  #       provider: mcp
  #       description: 内部管理用チケットシステム
  #       server: support-ticket-mcp
  #       tool: get_internal_ticket
  #
  #     # LogAnalyzerAgent で builtin を使う場合です。
  #     run_python_analysis:
  #       enabled: true
  #       provider: builtin
  #
  #     # ComplianceReviewerAgent でポリシー確認を有効化する場合です。
  #     check_policy:
  #       enabled: true
  #       provider: builtin
  #     request_revision:
  #       enabled: true
  #       provider: builtin
  #
  #     # 承認後の更新処理を個別に切り替える場合です。
  #     prepare_ticket_update:
  #       enabled: true
  #       provider: builtin
  #     zendesk_reply:
  #       enabled: true
  #       provider: builtin
  #     redmine_update:
  #       enabled: false
  #
  #     # builtin があっても明示的に使わない例です。
  #     record_approval_decision:
  #       enabled: false

  # 上記 external_ticket / internal_ticket の MCP tool は ticket_id を受け取り、summary と attachments を含む JSON を返すことを推奨します。
  # attachments の各要素は以下のいずれかを持てます。
  #   - content_base64: バイナリ添付
  #   - content: テキスト添付
  #   - path: 既に取得済みファイルへのパス

  # Agent ごとの個別設定です。
  # 既定値のままでよければ未指定で構いません。
  # agents:
  #   # スーパーバイザー Agent の設定です。
  #   SuperVisorAgent:
  #     enabled: true
  #     auto_compress: true
  #
  #   # 受付 Agent の設定です。
  #   IntakeAgent:
  #     enabled: true
  #     auto_compress: true
  #     pii_mask:
  #       # true の場合のみ Intake で PII マスキングを実行します。
  #       enabled: false
  #
  #   # ログ解析 Agent の設定です。
  #   LogAnalyzerAgent:
  #     enabled: true
  #     auto_compress: true
  #
  #   # ナレッジ検索 Agent の設定です。
  #   KnowledgeRetrieverAgent:
  #     enabled: true
  #     auto_compress: true
  #     # 文書探索時に除外する既定 glob パターンです。
  #     # 未指定時は .git や node_modules、.venv、__pycache__ などを除外します。
  #     # 指定すると既定値ごと上書きします。
  #     ignore_patterns:
  #       - .*
  #       - '**/.*'
  #       - node_modules/**
  #       - '**/node_modules/**'
  #
  #     # 追加の除外パターンを書いたテキストファイルです。
  #     # 1 行 1 パターンで、# から始まる行と空行は無視します。
  #     ignore_patterns_file: ./.support-ope-ignore
  #
  #     # KnowledgeRetrieverAgent が参照する文書群です。
  #     document_sources:
  #       - name: python312_manual
  #         description: Python 3.12 の公式仕様・標準ライブラリ資料
  #         path: ./docsources/python312_manual
  #       - name: denodo93_manual
  #         description: Denodo 9.3 の製品マニュアル
  #         path: ./docsources/denodo93_manual
  #       - name: growi_knowledge
  #         description: 社内 GROWI にエクスポートした運用ナレッジ
  #         path: ./docsources/growi_knowledge
  #       - name: ai-platform-poc
  #         description: 生成AI基盤のアーキテクチャ検討資料
  #         path: /home/user/source/repos/ai-platform-poc
  #     # DeepAgents backend では各 source を /knowledge/<name>/ 配下へ mount または route して参照します。
  #
  #   # ドラフト作成 Agent の設定です。
  #   DraftWriterAgent:
  #     enabled: true
  #     auto_compress: true
  #     # ComplianceReviewerAgent の差戻し観点を反映しながら再生成されます。
  #
  #   # コンプライアンス確認 Agent の設定です。
  #   ComplianceReviewerAgent:
  #     enabled: true
  #     auto_compress: true
  #     # DraftWriterAgent への差戻しを最大何回まで自動で回すかです。
  #     # 既定値は 3 です。
  #     max_review_loops: 3
  #     # ポリシー確認時に除外する既定 glob パターンです。
  #     ignore_patterns:
  #       - .*
  #       - '**/.*'
  #       - node_modules/**
  #       - '**/node_modules/**'
  #
  #     # 追加の除外パターンを書いたテキストファイルです。
  #     ignore_patterns_file: ./.support-ope-policy-ignore
  #
  #     # ComplianceReviewerAgent が参照する社内規定・法令・ガイドラインです。
  #     document_sources:
  #       - name: internal_policy
  #         description: 社内回答ポリシー
  #         path: ./docsources/internal_policy
  #       - name: government_guidelines
  #         description: 政府ガイドライン
  #         path: ./docsources/government_guidelines
  #       - name: laws
  #         description: 関連法令集
  #         path: ./docsources/laws
  #     # DeepAgents backend では各 source を /policy/<name>/ 配下へ mount または route して参照します。
  #     notice:
  #       # true の場合、ドラフトに注意文を必須とします。
  #       required: true
  #       # いずれか 1 つ以上を含めば通過と判定します。
  #       required_phrases:
  #         - 生成AIは誤った回答をすることがあります
  #         - 生成AIは誤った回答を含む可能性があります
  #
  #   # バックサポート向けエスカレーション整理 Agent の設定です。
  #   BackSupportEscalationAgent:
  #     enabled: true
  #     auto_compress: true
  #
  #   # バックサポート問い合わせ文案作成 Agent の設定です。
  #   BackSupportInquiryWriterAgent:
  #     enabled: true
  #     auto_compress: true
  #
  #   # 承認フェーズ Agent の設定です。
  #   ApprovalAgent:
  #     enabled: true
  #     auto_compress: true
  #
  #   # チケット更新 Agent の設定です。
  #   TicketUpdateAgent:
  #     enabled: true
  #     auto_compress: true